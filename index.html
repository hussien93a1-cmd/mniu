<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>منيو كباب الديرة</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#f6f8fb;
  --surface:#ffffff;
  --surface-2:#f8fafc;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e2e8f0;
  --accent:#0b3a75;
  --accent-2:#0e4a94;
  --accent-soft:#e8f0fb;
  --price:#0b3a75;
  --danger:#dc2626;
  --danger-bg:#fee2e2;
  --shadow:0 10px 25px rgba(15,23,42,.06);
  --shadow-2:0 18px 40px rgba(15,23,42,.08);
}
html{scroll-behavior:smooth}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:110px}
button,input,select,textarea{font:inherit}
.app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);transition:max-width .25s ease}
.app.tablet-mode{max-width:980px}
.top-shell{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,rgba(246,248,251,.98),rgba(246,248,251,.92));backdrop-filter:blur(10px);padding-top:max(env(safe-area-inset-top),10px)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;gap:10px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(180deg,var(--accent-2),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 22px rgba(11,58,117,.22)}
.logo svg{width:24px;height:24px;display:block}
.brand-title{font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.header-badges{display:flex;gap:8px;align-items:center}
.mini-pill{display:flex;align-items:center;gap:5px;padding:8px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--accent);box-shadow:var(--shadow)}
.mini-pill svg{width:14px;height:14px;display:block}
.search-wrap{padding:0 14px 12px}
.search-box{position:relative}
.search-box input{width:100%;height:52px;border:none;border-radius:18px;padding:0 48px 0 16px;background:#fff;box-shadow:var(--shadow);font-size:15px;outline:none}
.search-box input:focus{box-shadow:0 0 0 4px rgba(11,58,117,.08),var(--shadow)}
.search-box svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--accent)}
.categories-wrap{position:sticky;top:74px;z-index:35;padding:0 0 8px;background:linear-gradient(180deg,rgba(246,248,251,.96),rgba(246,248,251,.86));backdrop-filter:blur(8px)}
.categories{display:flex;gap:10px;overflow:auto;padding:0 14px}
.categories::-webkit-scrollbar{display:none}
.cat{border:none;background:#fff;color:var(--text);padding:10px 14px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;box-shadow:var(--shadow)}
.cat.active{background:var(--accent);color:#fff}
.content{padding:8px 14px 0}
.section{margin-bottom:22px;scroll-margin-top:140px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{margin:0;font-size:16px;font-weight:800}
.section-count{font-size:12px;color:var(--muted)}
.product-list{display:grid;gap:10px}
.product-card{background:#fff;border-radius:20px;padding:12px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;transition:transform .16s ease, box-shadow .16s ease}
.product-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-2)}
.product-card.bump{animation:bump .22s ease}
.product-main{display:flex;gap:12px;min-width:0}
.product-thumb{width:56px;height:56px;border-radius:16px;background:linear-gradient(180deg,#eef5ff,#e2ebfb);color:var(--accent);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.product-thumb svg{width:26px;height:26px;display:block}
.product-info{min-width:0}
.product-name{font-size:15px;font-weight:800;line-height:1.5}
.product-desc{font-size:12px;color:var(--muted);margin-top:4px}
.product-price{font-size:14px;font-weight:800;color:var(--price);margin-top:7px}
.product-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.add-btn{border:none;background:var(--accent);color:#fff;width:42px;height:42px;border-radius:14px;font-size:22px;cursor:pointer;box-shadow:0 10px 18px rgba(11,58,117,.18)}
.add-btn:active{transform:scale(.97)}
.in-cart{background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:800}
.empty-state{background:#fff;border-radius:18px;padding:24px 16px;text-align:center;color:var(--muted);box-shadow:var(--shadow)}
.floating-cart{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(480px,calc(100% - 24px));background:linear-gradient(180deg,var(--accent-2),var(--accent));color:#fff;border:none;border-radius:20px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 18px 34px rgba(11,58,117,.3);z-index:60;cursor:pointer}
.floating-cart.hidden{display:none}
.floating-cart-meta strong{display:block;font-size:15px}
.floating-cart-meta span{display:block;font-size:12px;opacity:.9;margin-top:4px}
.floating-cart-badge{min-width:38px;height:38px;padding:0 10px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.cart-drawer{position:fixed;inset:0;background:rgba(15,23,42,.36);display:none;align-items:flex-end;justify-content:center;z-index:80;padding:14px}
.cart-drawer.open{display:flex}
.cart-panel{width:min(520px,100%);max-height:88vh;background:#fff;border-radius:28px 28px 0 0;overflow:hidden;box-shadow:0 30px 70px rgba(15,23,42,.18);display:flex;flex-direction:column}
.cart-panel-header{padding:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line)}
.cart-panel-title{font-size:18px;font-weight:800}
.close-cart{width:40px;height:40px;border:none;border-radius:50%;background:var(--surface-2);color:var(--accent);font-size:22px;cursor:pointer}
.cart-scroll{overflow:auto;padding:14px 16px;background:var(--bg);flex:1}
.cart-group{margin-bottom:14px}
.group-title{font-size:14px;font-weight:800;margin:0 0 10px}
.cart-list{display:grid;gap:10px}
.cart-item{background:#fff;border-radius:18px;padding:12px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.cart-item-name{font-size:14px;font-weight:800}
.cart-item-sub{font-size:12px;color:var(--muted);margin-top:4px}
.cart-item-actions{display:flex;align-items:center;gap:8px}
.qty-box{display:flex;align-items:center;gap:6px;background:var(--surface-2);border-radius:999px;padding:4px}
.qty-btn{width:30px;height:30px;border:none;border-radius:50%;background:#fff;color:var(--accent);font-size:18px;cursor:pointer;box-shadow:var(--shadow)}
.qty-value{min-width:24px;text-align:center;font-size:13px;font-weight:800}
.remove-item{width:34px;height:34px;border:none;border-radius:12px;background:var(--danger-bg);color:var(--danger);font-size:18px;cursor:pointer}
.form-card{background:#fff;border-radius:18px;padding:14px;box-shadow:var(--shadow)}
.form-card + .form-card{margin-top:12px}
.form-title{margin:0 0 12px;font-size:14px;font-weight:800}
.field{margin-bottom:10px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:var(--text)}
.field input,.field textarea,.field select{width:100%;border:none;border-radius:14px;background:var(--surface-2);padding:12px 14px;font:inherit;outline:none}
.field textarea{min-height:82px;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{box-shadow:0 0 0 4px rgba(11,58,117,.08)}
.validation{display:none;font-size:12px;color:var(--danger);margin-top:6px}
.validation.show{display:block}
.totals{display:grid;gap:8px}
.total-row{display:flex;align-items:center;justify-content:space-between;font-size:14px}
.total-row strong{font-size:16px}
.primary-btn{width:100%;border:none;background:linear-gradient(180deg,var(--accent-2),var(--accent));color:#fff;border-radius:16px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px}
.secondary-note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.7;text-align:center}
.toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(14px);background:#111827;color:#fff;padding:12px 14px;border-radius:14px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.22s ease;z-index:95}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.helper-note{font-size:12px;color:var(--muted);text-align:center;padding:0 20px 10px}
@keyframes bump{0%{transform:scale(1)}45%{transform:scale(1.025)}100%{transform:scale(1)}}
@media (min-width:768px){
  .app.tablet-mode .topbar{padding:16px 18px 12px}
  .app.tablet-mode .search-wrap{padding:0 18px 14px}
  .app.tablet-mode .categories{padding:0 18px}
  .app.tablet-mode .content{padding:10px 18px 0}
  .app.tablet-mode .categories-wrap{top:78px}
  .app.tablet-mode .product-list{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .app.tablet-mode .cart-panel{width:min(860px,100%)}
  .app.tablet-mode .cart-scroll{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;align-items:start}
  .app.tablet-mode .cart-group{margin-bottom:0}
  .app.tablet-mode .floating-cart{width:min(760px,calc(100% - 32px))}
}
@media (max-width:520px){
  .header-badges{display:none}
  .topbar{padding-inline:12px}
  .search-wrap{padding-inline:12px}
  .categories{padding-inline:12px}
  .content{padding-inline:12px}
  .categories-wrap{top:74px}
}
</style>
</head>
<body>
<div class="app">

  function getItemIcon(category){
    const icons = {
      'كباب لحم':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 5l12 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="8" cy="8" r="2" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="16" cy="16" r="2" fill="currentColor"/></svg>',
      'كباب دجاج':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 7c1.5-1.5 4.5-1.5 6 0l4 4c1.5 1.5 1.5 4.5 0 6s-4.5 1.5-6 0l-4-4C5.5 11.5 5.5 8.5 7 7z" stroke="currentColor" stroke-width="1.8"/><path d="M6 18l-1.5 1.5M18 6l1.5-1.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
      'تكّة لحم':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="7" width="14" height="10" rx="4" stroke="currentColor" stroke-width="1.8"/><path d="M9 7V5M15 7V5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
      'تكّة دجاج':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 8c2-2 6-2 8 0 2 2 2 6 0 8s-6 2-8 0-2-6 0-8z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>',
      'المعاليق':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 7c0-1.657 1.79-3 4-3s4 1.343 4 3-1.79 3-4 3-4-1.343-4-3z" stroke="currentColor" stroke-width="1.8"/><path d="M7 13c0-1.657 2.239-3 5-3s5 1.343 5 3-2.239 5-5 5-5-3.343-5-5z" stroke="currentColor" stroke-width="1.8"/></svg>',
      'أطباق أخرى':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>',
      'مشروبات باردة':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 4h6l-1 15a2 2 0 0 1-2 1.8A2 2 0 0 1 10 19L9 4z" stroke="currentColor" stroke-width="1.8"/><path d="M8 4h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
      'مقبلات':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12c0-3.866 3.134-7 7-7s7 3.134 7 7H5z" stroke="currentColor" stroke-width="1.8"/><path d="M7 15h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
      'إضافات':'<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>'
    };
    return icons[category] || icons['أطباق أخرى'];
  }

  function getCustomerData(){
    return {
      name: customerNameEl.value.trim(),
      phone: normalizePhone(customerPhoneEl.value.trim()),
      address: customerAddressEl.value.trim(),
      note: customerNoteEl.value.trim(),
      orderType: orderTypeEl.value
    };
  }

  function saveState(){
    const payload = { cart, currentCat, searchTerm, customer: getCustomerData() };
    try { localStorage.setItem(storageKey, JSON.stringify(payload)); } catch (err) {}
  }

  function restoreState(){
    try {
      const raw = localStorage.getItem(storageKey);
      if (!raw) return;
      const saved = JSON.parse(raw);
      if (Array.isArray(saved.cart)) cart = saved.cart;
      if (typeof saved.currentCat === 'string') currentCat = saved.currentCat;
      if (typeof saved.searchTerm === 'string') searchTerm = saved.searchTerm;
      if (saved.customer) {
        customerNameEl.value = saved.customer.name || '';
        customerPhoneEl.value = saved.customer.phone || '';
        customerAddressEl.value = saved.customer.address || '';
        customerNoteEl.value = saved.customer.note || '';
        orderTypeEl.value = saved.customer.orderType || 'توصيل';
      }
      searchInput.value = searchTerm;
    } catch (err) {}
  }

  function showToast(message){
    toastEl.textContent = message;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 1600);
  }

  function getSubtotal(items){ return items.reduce(function(sum,item){ return sum + Number(item.price || 0) * Number(item.qty || 0); }, 0); }
  function getDeliveryByType(type,items){ return type === 'توصيل' && items.length ? deliveryFee : 0; }
  function getGrandTotal(items,type){ return getSubtotal(items) + getDeliveryByType(type,items); }
  function getTotalQty(items){ return items.reduce(function(sum,item){ return sum + Number(item.qty || 0); }, 0); }

  function animateCard(card){
    if (!card) return;
    card.classList.remove('bump');
    void card.offsetWidth;
    card.classList.add('bump');
  }

  function addToCart(item, cardEl){
    hapticFeedback();
    const existing = cart.find(function(entry){ return entry.id === item.id; });
    if (existing) existing.qty += 1;
    else cart.push({ id:item.id, name:item.name, price:item.price, qty:1 });
    animateCard(cardEl);
    renderProducts();
    renderCart();
    saveState();
    showToast('تمت إضافة ' + item.name);
  }

  function updateQty(id,delta){
    hapticFeedback();
    const entry = cart.find(function(item){ return item.id === id; });
    if (!entry) return;
    entry.qty += delta;
    if (entry.qty <= 0) cart = cart.filter(function(item){ return item.id !== id; });
    renderProducts();
    renderCart();
    saveState();
  }

  function removeCartItem(id){
    cart = cart.filter(function(item){ return item.id !== id; });
    renderProducts();
    renderCart();
    saveState();
  }

  function clearCart(){
    cart = [];
    renderProducts();
    renderCart();
    saveState();
    closeCart();
  }

  function openCart(){ cartDrawer.classList.add('open'); cartDrawer.setAttribute('aria-hidden','false'); }
  function closeCart(){ cartDrawer.classList.remove('open'); cartDrawer.setAttribute('aria-hidden','true'); }

  function updateAddressVisibility(){
    addressFieldEl.style.display = orderTypeEl.value === 'توصيل' ? 'block' : 'none';
    renderCart();
    saveState();
  }

  function validateCustomer(){
    const customer = getCustomerData();
    const validName = customer.name.length > 1;
    const validPhone = isValidLocalPhone(customer.phone);
    nameValidationEl.classList.toggle('show', !validName);
    phoneValidationEl.classList.toggle('show', !validPhone);
    return validName && validPhone;
  }

  function buildWhatsAppMessage(items){
    const customer = getCustomerData();
    const subtotal = getSubtotal(items);
    const delivery = getDeliveryByType(customer.orderType, items);
    const grand = subtotal + delivery;
    const lines = ['🍽️ طلب جديد - كباب الديرة', '', '👤 الاسم: ' + customer.name, '📞 الهاتف: ' + customer.phone, '🛍️ نوع الطلب: ' + customer.orderType];
    if (customer.orderType === 'توصيل' && customer.address) lines.push('📍 العنوان: ' + customer.address);
    if (customer.note) lines.push('📝 ملاحظات: ' + customer.note);
    lines.push('', '🧾 تفاصيل الطلب:');
    items.forEach(function(item,index){ lines.push((index + 1) + '- ' + item.name + ' × ' + item.qty + ' = ' + formatIQD(item.price * item.qty)); });
    lines.push('--------------------');
    lines.push('مجموع الطلب: ' + formatIQD(subtotal));
    lines.push('أجور التوصيل: ' + formatIQD(delivery));
    lines.push('الإجمالي: ' + formatIQD(grand));
    return lines.join('\n');
  }

  function getFilteredCategories(){
    const term = searchTerm.trim().toLowerCase();
    const categoriesToShow = currentCat === 'الكل' ? Object.keys(data) : [currentCat];
    return categoriesToShow.map(function(cat){
      const items = data[cat].filter(function(item){ return !term || item.name.toLowerCase().includes(term) || cat.toLowerCase().includes(term); });
      return { cat:cat, items:items };
    }).filter(function(group){ return group.items.length > 0; });
  }

  function getQtyForProduct(id){
    const found = cart.find(function(item){ return item.id === id; });
    return found ? found.qty : 0;
  }

  function renderCats(){
    catsEl.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'cat' + (currentCat === 'الكل' ? ' active' : '');
    allBtn.type = 'button';
    allBtn.textContent = 'الكل';
    allBtn.addEventListener('click', function(){ currentCat = 'الكل'; render(); window.scrollTo({ top:0, behavior:'smooth' }); saveState(); });
    catsEl.appendChild(allBtn);

    Object.keys(data).forEach(function(cat){
      const btn = document.createElement('button');
      btn.className = 'cat' + (cat === currentCat ? ' active' : '');
      btn.type = 'button';
      btn.textContent = cat;
      btn.addEventListener('click', function(){ currentCat = cat; render(); const target = document.getElementById('section-' + slugify(cat)); if (target) target.scrollIntoView({ behavior:'smooth', block:'start' }); saveState(); });
      catsEl.appendChild(btn);
    });
  }

  function renderProducts(){
    productsEl.innerHTML = '';
    const groups = getFilteredCategories();
    if (!groups.length) {
      productsEl.innerHTML = '<div class="empty-state">لا توجد نتائج مطابقة للبحث الحالي.</div>';
      return;
    }
    groups.forEach(function(group){
      const section = document.createElement('section');
      section.className = 'section';
      section.id = 'section-' + slugify(group.cat);
      const head = document.createElement('div');
      head.className = 'section-head';
      head.innerHTML = '<h2 class="section-title">' + group.cat + '</h2><span class="section-count">' + group.items.length + ' أصناف</span>';
      section.appendChild(head);
      const list = document.createElement('div');
      list.className = 'product-list';
      group.items.forEach(function(item){
        const qty = getQtyForProduct(item.id);
        const row = document.createElement('div');
        row.className = 'product-card';
        row.innerHTML = '<div class="product-main"><div class="product-thumb">' + getItemIcon(group.cat) + '</div><div class="product-info"><div class="product-name">' + item.name + '</div><div class="product-desc">' + item.desc + '</div><div class="product-price">' + formatIQD(item.price) + '</div></div></div><div class="product-actions"><button class="add-btn" type="button" aria-label="إضافة">+</button>' + (qty ? '<div class="in-cart">في السلة ' + qty + '</div>' : '') + '</div>';
        row.querySelector('.add-btn').addEventListener('click', function(e){ e.stopPropagation(); addToCart(item, row); });
        row.addEventListener('click', function(){ addToCart(item, row); });
        list.appendChild(row);
      });
      section.appendChild(list);
      productsEl.appendChild(section);
    });
  }

  function renderCart(){
    const customer = getCustomerData();
    const subtotal = getSubtotal(cart);
    const delivery = getDeliveryByType(customer.orderType, cart);
    const grand = subtotal + delivery;
    const totalQty = getTotalQty(cart);
    cartCountEl.textContent = totalQty ? 'عرض الطلب' : 'السلة فارغة';
    cartTotalEl.textContent = totalQty ? 'المجموع ' + formatIQD(grand) : 'أضف أصنافك المفضلة';
    cartQtyBadgeEl.textContent = totalQty;
    subtotalValueEl.textContent = formatIQD(subtotal);
    deliveryValueEl.textContent = formatIQD(delivery);
    grandTotalValueEl.textContent = formatIQD(grand);
    openCartBtn.classList.toggle('hidden', !totalQty);

    if (!cart.length) {
      cartItemsEl.innerHTML = '<div class="empty-state">لم تقم بإضافة أي صنف بعد.</div>';
      return;
    }

    cartItemsEl.innerHTML = '';
    cart.forEach(function(item){
      const row = document.createElement('div');
      row.className = 'cart-item';
      row.innerHTML = '<div><div class="cart-item-name">' + item.name + '</div><div class="cart-item-sub">' + formatIQD(item.price) + ' × ' + item.qty + ' = ' + formatIQD(item.price * item.qty) + '</div></div><div class="cart-item-actions"><div class="qty-box"><button class="qty-btn" type="button" data-action="plus" data-id="' + item.id + '">+</button><div class="qty-value">' + item.qty + '</div><button class="qty-btn" type="button" data-action="minus" data-id="' + item.id + '">−</button></div><button class="remove-item" type="button" data-id="' + item.id + '">×</button></div>';
      cartItemsEl.appendChild(row);
    });

    cartItemsEl.querySelectorAll('.qty-btn').forEach(function(btn){ btn.addEventListener('click', function(){ updateQty(btn.dataset.id, btn.dataset.action === 'plus' ? 1 : -1); }); });
    cartItemsEl.querySelectorAll('.remove-item').forEach(function(btn){ btn.addEventListener('click', function(){ removeCartItem(btn.dataset.id); }); });
  }

  function applyResponsiveMode(){
    const isTablet = window.innerWidth >= 768;
    appEl.classList.toggle('tablet-mode', isTablet);
    viewModeLabelEl.textContent = isTablet ? 'وضع التابلت' : 'وضع الهاتف';
  }

  function render(){ renderCats(); renderProducts(); }

  function sendOrder(){
    if (!cart.length) { alert('السلة فارغة'); return; }
    if (!validateCustomer()) { openCart(); return; }

    const text = buildWhatsAppMessage(cart);
    const encodedText = encodeURIComponent(text);
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    const url = isMobile
      ? 'https://wa.me/' + phone + '?text=' + encodedText
      : 'https://api.whatsapp.com/send?phone=' + phone + '&text=' + encodedText;

    const newWindow = window.open(url, '_blank', 'noopener,noreferrer');
    if (!newWindow) {
      window.location.href = url;
    }
  }

  searchInput.addEventListener('input', function(){ searchTerm = searchInput.value.trim(); renderProducts(); saveState(); });
  drawerSendOrderBtn.addEventListener('click', sendOrder);
  openCartBtn.addEventListener('click', openCart);
  closeCartBtn.addEventListener('click', closeCart);
  clearCartBtn.addEventListener('click', clearCart);
  orderTypeEl.addEventListener('change', updateAddressVisibility);
  [customerNameEl, customerPhoneEl, customerAddressEl, customerNoteEl].forEach(function(field){ field.addEventListener('input', function(){ validateCustomer(); renderCart(); saveState(); }); });
  cartDrawer.addEventListener('click', function(event){ if (event.target === cartDrawer) closeCart(); });
  document.addEventListener('keydown', function(event){ if (event.key === 'Escape') closeCart(); });
  window.addEventListener('resize', applyResponsiveMode);

  restoreState();
  updateAddressVisibility();
  applyResponsiveMode();
  render();
  renderCart();
});
</script>
</body>
</html>
