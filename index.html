<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منيو كباب الديرة - طلبات الواتساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-bounce-subtle { animation: bounce-subtle 3s infinite; }
        @keyframes bounce-subtle { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .grid-bg { background-image: radial-gradient(#fbbf24 0.5px, transparent 0.5px); background-size: 15px 15px; }
        .success-overlay { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-stone-50 grid-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const WHATSAPP_NUMBER = "9647838468817";
        const DELIVERY_FEE = 1000;
        const CURRENCY = "د.ع";
        const STORAGE_CART_KEY = "kd_customer_cart";
        const STORAGE_USER_KEY = "kd_customer_data";
        const STORAGE_HISTORY_KEY = "kd_order_history";

        const MENU_DATA = {
            categories: [
                { id: 'nafarat', name: 'قسم النفرات', details: 'مشويات طازجة يومياً', icon: 'flame' },
                { id: 'weight', name: 'قسم كباب الوزن', details: 'لحم غنم عراقي أصيل', icon: 'package' },
                { id: 'sandwiches', name: 'الساندويش / اللفات', details: 'وجبات سريعة وخفيفة', icon: 'utensils' },
                { id: 'drinks', name: 'المشروبات الباردة', details: 'عصائر ومشروبات غازية', icon: 'coffee' },
                { id: 'extras', name: 'إضافات أخرى', details: 'مقبلات وصمون حار', icon: 'plus' },
            ],
            items: [
                { id: 'n1', categoryId: 'nafarat', name: 'كباب لحم', description: 'لحم طازج مشوي على الفحم', options: [
                    { id: 'o1_1', name: 'شيش كباب لحم', price: 2500 },
                    { id: 'o1_2', name: 'نص نفر كباب لحم', price: 5000 },
                    { id: 'o1_3', name: 'نفر كباب لحم', price: 10000 },
                ]},
                { id: 'n2', categoryId: 'nafarat', name: 'تكه لحم', description: 'قطع لحم الغنم الفاخرة', options: [
                    { id: 'o2_1', name: 'شيش تكه لحم', price: 3000 },
                    { id: 'o2_2', name: 'نص نفر تكه لحم', price: 6000 },
                    { id: 'o2_3', name: 'نفر تكه لحم', price: 10000 },
                ]},
                { id: 'n3', categoryId: 'nafarat', name: 'معلاك', description: 'معلاك طازج مشوي يومياً', options: [
                    { id: 'o3_1', name: 'شيش معلاك', price: 3000 },
                    { id: 'o3_2', name: 'نص نفر معلاك', price: 6000 },
                    { id: 'o3_3', name: 'نفر معلاك', price: 12000 },
                ]},
                { id: 'n4', categoryId: 'nafarat', name: 'تكه دجاج', description: 'صدور دجاج متبلة بخلطة الديرة', options: [
                    { id: 'o4_1', name: 'شيش تكه دجاج', price: 2000 },
                    { id: 'o4_2', name: 'نص نفر تكه دجاج', price: 4000 },
                    { id: 'o4_3', name: 'نفر تكه دجاج', price: 8000 },
                ]},
                { id: 'n5', categoryId: 'nafarat', name: 'كباب دجاج', description: 'كباب دجاج متبل بالتوابل الخاصة', options: [
                    { id: 'o5_1', name: 'شيش كباب دجاج', price: 2000 },
                    { id: 'o5_2', name: 'نص نفر كباب دجاج', price: 4000 },
                    { id: 'o5_3', name: 'نفر كباب دجاج', price: 8000 },
                ]},
                { id: 'w1', categoryId: 'weight', name: 'كباب لحم بالوزن', options: [
                    { id: 'ow1_1', name: '1 كيلو كباب لحم', price: 24000 },
                    { id: 'ow1_2', name: 'نصف كيلو كباب لحم', price: 12000 },
                    { id: 'ow1_3', name: 'نصف كيلو كباب مشكل', price: 10000 },
                ]},
                { id: 'w2', categoryId: 'weight', name: 'كباب دجاج بالوزن', options: [
                    { id: 'ow2_1', name: '1 كيلو كباب دجاج', price: 14000 },
                    { id: 'ow2_2', name: 'نصف كيلو كباب دجاج', price: 7000 },
                ]},
                { id: 's1', categoryId: 'sandwiches', name: 'لفة كباب لحم', options: [{ id: 'os1', name: 'لفة كباب لحم', price: 2500 }]},
                { id: 's2', categoryId: 'sandwiches', name: 'لفة تكه لحم', options: [{ id: 'os2', name: 'لفة تكه لحم', price: 2500 }]},
                { id: 's3', categoryId: 'sandwiches', name: 'لفة معلاك', options: [{ id: 'os3', name: 'لفة معلاك', price: 2500 }]},
                { id: 's4', categoryId: 'sandwiches', name: 'لفة تكه دجاج', options: [{ id: 'os4', name: 'لفة تكه دجاج', price: 2000 }]},
                { id: 's5', categoryId: 'sandwiches', name: 'لفة كباب دجاج', options: [{ id: 'os5', name: 'لفة كباب دجاج', price: 1500 }]},
                { id: 'd1', categoryId: 'drinks', name: 'كولا', options: [{ id: 'od1', name: 'كولا باردة', price: 500 }]},
                { id: 'd2', categoryId: 'drinks', name: 'سبرايت', options: [{ id: 'od2', name: 'سبرايت بارد', price: 500 }]},
                { id: 'd3', categoryId: 'drinks', name: 'فانتا', options: [{ id: 'od3', name: 'فانتا بارد', price: 500 }]},
                { id: 'd4', categoryId: 'drinks', name: 'لبن', options: [{ id: 'od4', name: 'لبن أربيل', price: 500 }]},
                { id: 'd5', categoryId: 'drinks', name: 'ماء', options: [{ id: 'od5', name: 'ماء معدني', price: 500 }]},
                { id: 'e1', categoryId: 'extras', name: 'صمون عدد 6', options: [{ id: 'oe1', name: 'وجبة صمون فرنسي', price: 1000 }]},
                { id: 'e2', categoryId: 'extras', name: 'ببسي كبير', options: [{ id: 'oe2', name: 'ببسي عائلي', price: 1500 }]},
                { id: 'e3', categoryId: 'extras', name: 'صحن مقبلات', options: [{ id: 'oe3', name: 'مقبلات مشكلة', price: 1000 }]},
            ]
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('categories');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [orderSuccess, setOrderSuccess] = useState(false);

            // استعادة السلة
            const [cart, setCart] = useState(() => {
                const saved = localStorage.getItem(STORAGE_CART_KEY);
                return saved ? JSON.parse(saved) : [];
            });

            // استعادة بيانات الزبون (الاسم، الهاتف، العنوان)
            const [customerInfo, setCustomerInfo] = useState(() => {
                const saved = localStorage.getItem(STORAGE_USER_KEY);
                return saved ? JSON.parse(saved) : { name: '', phone: '', address: '' };
            });

            // استعادة سجل الطلبات
            const [orderHistory, setOrderHistory] = useState(() => {
                const saved = localStorage.getItem(STORAGE_HISTORY_KEY);
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => { localStorage.setItem(STORAGE_CART_KEY, JSON.stringify(cart)); }, [cart]);
            useEffect(() => { localStorage.setItem(STORAGE_USER_KEY, JSON.stringify(customerInfo)); }, [customerInfo]);
            useEffect(() => { localStorage.setItem(STORAGE_HISTORY_KEY, JSON.stringify(orderHistory)); }, [orderHistory]);

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal > 0 ? subtotal + DELIVERY_FEE : 0;

            const addToCart = (item, option) => {
                const cartItemId = `${item.id}-${option.id}`;
                const existing = cart.find(i => i.cartId === cartItemId);
                if (existing) {
                    setCart(cart.map(i => i.cartId === cartItemId ? { ...i, quantity: i.quantity + 1 } : i));
                } else {
                    setCart([...cart, { cartId: cartItemId, itemId: item.id, optionId: option.id, name: item.name, optionName: option.name, price: option.price, quantity: 1 }]);
                }
                setSelectedItem(null);
            };

            const updateQuantity = (cartId, delta) => {
                setCart(cart.map(item => {
                    if (item.cartId === cartId) {
                        const newQty = Math.max(0, item.quantity + delta);
                        return newQty === 0 ? null : { ...item, quantity: newQty };
                    }
                    return item;
                }).filter(Boolean));
            };

            const sendToWhatsApp = () => {
                if (!customerInfo.name || !customerInfo.phone || !customerInfo.address) {
                    // بدلاً من alert ننتقل لصفحة الإدخال
                    setCurrentView('checkout');
                    return;
                }

                // إضافة الطلب للسجل
                const historyEntry = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString('ar-IQ'),
                    time: new Date().toLocaleTimeString('ar-IQ', { hour: '2-digit', minute: '2-digit' }),
                    items: [...cart],
                    total: total
                };
                
                const newHistory = [historyEntry, ...orderHistory].slice(0, 15);
                setOrderHistory(newHistory);

                // بناء الرسالة
                let message = `*طلب جديد من كباب الديرة*\n\n`;
                message += `👤 *الزبون:* ${customerInfo.name}\n`;
                message += `📞 *الهاتف:* ${customerInfo.phone}\n`;
                message += `📍 *العنوان:* ${customerInfo.address}\n\n`;
                message += `🛒 *تفاصيل الطلب:*\n`;
                cart.forEach(item => {
                    message += `- ${item.name} (${item.optionName})\n`;
                    message += `  الكمية: ${item.quantity} × ${item.price.toLocaleString()} ${CURRENCY}\n`;
                });
                message += `\n--------------------------\n`;
                message += `💰 المجموع: ${subtotal.toLocaleString()} ${CURRENCY}\n`;
                message += `🚚 التوصيل: ${DELIVERY_FEE.toLocaleString()} ${CURRENCY}\n`;
                message += `✅ *الإجمالي النهائي: ${total.toLocaleString()} ${CURRENCY}*`;

                const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
                
                setOrderSuccess(true);
                setCart([]); // تفريغ السلة فقط
                
                setTimeout(() => {
                    window.location.href = whatsappUrl;
                    setOrderSuccess(false);
                    setCurrentView('categories');
                }, 1500);
            };

            return (
                <div className="min-h-screen text-stone-900 pb-24" dir="rtl">
                    {}
                    <header className="sticky top-0 z-40 bg-gradient-to-r from-orange-500 via-orange-600 to-yellow-500 text-white p-4 shadow-xl flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            {currentView !== 'categories' && (
                                <button onClick={() => setCurrentView('categories')} className="bg-white/20 p-2 rounded-full">
                                    <Icon name="arrow-right" className="w-5 h-5" />
                                </button>
                            )}
                            <div>
                                <h1 className="font-black text-2xl tracking-tighter">كباب الديرة</h1>
                                <p className="text-[10px] uppercase font-bold tracking-widest opacity-80">قسم الطلبات الخارجية</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setCurrentView('history')} className="bg-white/20 p-3 rounded-2xl active:scale-95 transition-transform">
                                <Icon name="clipboard-list" className="w-6 h-6" />
                            </button>
                            <button onClick={() => setIsCartOpen(true)} className="relative bg-white/20 p-3 rounded-2xl active:scale-95 transition-transform">
                                <Icon name="shopping-cart" className="w-6 h-6" />
                                {cart.length > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-white text-orange-600 text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow-lg">
                                        {cart.reduce((a, b) => a + b.quantity, 0)}
                                    </span>
                                )}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4">
                        {}
                        {currentView === 'categories' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-xl font-black border-r-4 border-orange-500 pr-3">القائمة الرئيسية</h2>
                                    <span className="text-xs font-bold text-orange-600 bg-orange-100 px-3 py-1 rounded-full">توصيل الحرية</span>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {MENU_DATA.categories.map((cat) => (
                                        <button key={cat.id} onClick={() => { setSelectedCategory(cat); setCurrentView('items'); }} className="bg-white rounded-[2rem] p-4 shadow-sm border border-stone-100 flex flex-col items-center text-center active:scale-95 transition-all group">
                                            <div className="w-16 h-16 bg-orange-50 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-orange-500 group-hover:text-white transition-colors duration-300">
                                                <Icon name={cat.icon} className="w-8 h-8 text-orange-600 group-hover:text-white" />
                                            </div>
                                            <h3 className="font-bold text-sm text-stone-800">{cat.name}</h3>
                                            <p className="text-[10px] text-stone-400 mt-1">{cat.details}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {}
                        {currentView === 'history' && (
                            <div className="animate-in fade-in slide-in-from-left-4 duration-300">
                                <h2 className="text-2xl font-black mb-6 text-center text-orange-600">طلباتك السابقة</h2>
                                {orderHistory.length === 0 ? (
                                    <div className="bg-white rounded-3xl p-10 text-center text-stone-300">
                                        <Icon name="history" className="w-16 h-16 mx-auto mb-4 opacity-20" />
                                        <p className="font-bold">لا توجد طلبات سابقة بعد</p>
                                        <button onClick={() => setCurrentView('categories')} className="mt-4 text-orange-500 font-black text-sm">ابدأ الطلب الآن</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {orderHistory.map(order => (
                                            <div key={order.id} className="bg-white rounded-3xl p-5 shadow-sm border border-stone-100">
                                                <div className="flex justify-between items-center mb-3 border-b border-stone-50 pb-2">
                                                    <div className="text-[10px] font-black text-stone-400">📅 {order.date} | 🕒 {order.time}</div>
                                                    <div className="text-orange-600 font-black text-sm">{order.total.toLocaleString()} {CURRENCY}</div>
                                                </div>
                                                <div className="space-y-1">
                                                    {order.items.map((it, idx) => (
                                                        <div key={idx} className="text-[11px] text-stone-600 flex justify-between">
                                                            <span>• {it.name} <span className="text-[9px] opacity-60">({it.optionName})</span></span>
                                                            <span className="font-black">×{it.quantity}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={() => { if(confirm('هل أنت متأكد من مسح السجل؟')) setOrderHistory([]); }} className="w-full text-stone-300 text-xs font-bold py-4">مسح سجل الطلبات</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {}
                        {currentView === 'items' && selectedCategory && (
                            <div className="animate-in fade-in slide-in-from-left-4 duration-300">
                                <div className="flex items-center gap-2 mb-6">
                                    <button onClick={() => setCurrentView('categories')} className="text-stone-400 font-bold text-sm">الرئيسية</button>
                                    <Icon name="chevron-right" className="w-4 h-4 text-stone-300" />
                                    <h2 className="text-lg font-black text-orange-600">{selectedCategory.name}</h2>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    {MENU_DATA.items.filter(item => item.categoryId === selectedCategory.id).map(item => (
                                        <div key={item.id} onClick={() => setSelectedItem(item)} className="bg-white rounded-3xl p-5 shadow-sm border border-stone-100 flex items-center justify-between active:bg-orange-50 transition-all cursor-pointer">
                                            <div className="flex-1">
                                                <h3 className="font-black text-lg text-stone-800">{item.name}</h3>
                                                {item.description && <p className="text-stone-500 text-xs mt-1">{item.description}</p>}
                                            </div>
                                            <div className="bg-orange-500 text-white p-3 rounded-2xl shadow-lg shadow-orange-200"><Icon name="plus" className="w-5 h-5" /></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {}
                        {currentView === 'checkout' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-300">
                                <h2 className="text-2xl font-black mb-6 text-center text-stone-800">بيانات التوصيل</h2>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-stone-100 space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-sm font-black mr-2 text-stone-600">الاسم الثلاثي</label>
                                        <div className="relative">
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-orange-500"><Icon name="user" className="w-5 h-5" /></div>
                                            <input type="text" placeholder="مثال: علي محمد حسن" className="w-full bg-stone-50 border-2 border-stone-100 focus:border-orange-500 rounded-2xl py-4 pr-12 pl-4 outline-none transition-all font-bold text-sm" value={customerInfo.name} onChange={(e) => setCustomerInfo({...customerInfo, name: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-sm font-black mr-2 text-stone-600">رقم الهاتف</label>
                                        <div className="relative">
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-orange-500"><Icon name="phone" className="w-5 h-5" /></div>
                                            <input type="tel" placeholder="07XXXXXXXXX" className="w-full bg-stone-50 border-2 border-stone-100 focus:border-orange-500 rounded-2xl py-4 pr-12 pl-4 outline-none transition-all font-bold text-sm" value={customerInfo.phone} onChange={(e) => setCustomerInfo({...customerInfo, phone: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-sm font-black mr-2 text-stone-600">العنوان بالتفصيل</label>
                                        <div className="relative">
                                            <div className="absolute right-4 top-4 text-orange-500"><Icon name="map-pin" className="w-5 h-5" /></div>
                                            <textarea placeholder="الزقاق، رقم الدار، أقرب نقطة دالة..." className="w-full bg-stone-50 border-2 border-stone-100 focus:border-orange-500 rounded-2xl py-4 pr-12 pl-4 outline-none transition-all h-32 font-bold text-sm" value={customerInfo.address} onChange={(e) => setCustomerInfo({...customerInfo, address: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={sendToWhatsApp} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3 shadow-xl shadow-green-100 active:scale-95 transition-all">إرسال الطلب (واتساب)<Icon name="send" className="w-5 h-5" /></button>
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    {orderSuccess && (
                        <div className="fixed inset-0 z-[100] bg-green-600 success-overlay flex flex-col items-center justify-center text-white p-10 text-center">
                            <div className="bg-white/20 p-6 rounded-full mb-6 animate-bounce"><Icon name="check-circle" className="w-20 h-20" /></div>
                            <h2 className="text-3xl font-black mb-2">تم الحفظ والإرسال!</h2>
                            <p className="text-lg opacity-90 font-bold">تمت إضافة الطلب لسجلك.. جارِ التحويل</p>
                        </div>
                    )}

                    {}
                    {selectedItem && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm px-0 transition-opacity">
                            <div className="bg-white w-full max-w-md rounded-t-[3rem] p-8 animate-in slide-in-from-bottom duration-300 shadow-2xl">
                                <div className="w-16 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
                                <div className="flex justify-between items-start mb-8">
                                    <div><h3 className="text-3xl font-black text-stone-900">{selectedItem.name}</h3><p className="text-stone-400 font-bold mt-1">اختر النوع أو الكمية:</p></div>
                                    <button onClick={() => setSelectedItem(null)} className="bg-stone-100 p-3 rounded-2xl"><Icon name="x" className="w-6 h-6 text-stone-600" /></button>
                                </div>
                                <div className="space-y-3 max-h-[50vh] overflow-y-auto pb-10">
                                    {selectedItem.options.map(option => (
                                        <button key={option.id} onClick={() => addToCart(selectedItem, option)} className="w-full flex justify-between items-center p-6 bg-stone-50 hover:bg-orange-50 border-2 border-transparent hover:border-orange-100 rounded-[1.5rem] group transition-all active:scale-[0.98]">
                                            <span className="font-black text-lg group-hover:text-orange-600">{option.name}</span>
                                            <div className="flex items-center gap-3">
                                                <span className="bg-orange-100 text-orange-700 px-4 py-2 rounded-xl font-black text-sm">{option.price.toLocaleString()} {CURRENCY}</span>
                                                <div className="bg-orange-500 text-white p-1 rounded-lg shadow-sm"><Icon name="plus" className="w-5 h-5" /></div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 overflow-hidden">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="absolute left-0 top-0 bottom-0 w-full max-w-sm bg-white shadow-2xl flex flex-col animate-in slide-in-from-left duration-300">
                                <div className="p-6 border-b flex justify-between items-center bg-stone-50">
                                    <h2 className="text-xl font-black flex items-center gap-2 text-orange-600"><Icon name="shopping-cart" /> سلة المشتريات</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="p-2 bg-stone-200/50 rounded-xl"><Icon name="x" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {cart.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-stone-300">
                                            <Icon name="package" className="w-20 h-20 mb-4 opacity-20" />
                                            <p className="font-bold">السلة فارغة حالياً</p>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.cartId} className="flex items-center gap-4 bg-white p-4 rounded-2xl border-2 border-stone-50 shadow-sm">
                                                <div className="flex-1"><h4 className="font-black text-sm text-stone-800">{item.name}</h4><p className="text-[10px] text-orange-600 font-black">{item.optionName}</p><p className="text-xs text-stone-400 mt-1 font-bold">{(item.price * item.quantity).toLocaleString()} {CURRENCY}</p></div>
                                                <div className="flex items-center gap-3 bg-stone-100 p-2 rounded-xl">
                                                    <button onClick={() => updateQuantity(item.cartId, -1)} className="p-1 text-orange-600 bg-white rounded-lg shadow-sm"><Icon name="minus" className="w-4 h-4" /></button>
                                                    <span className="font-black text-sm min-w-[20px] text-center">{item.quantity}</span>
                                                    <button onClick={() => updateQuantity(item.cartId, 1)} className="p-1 text-orange-600 bg-white rounded-lg shadow-sm"><Icon name="plus" className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-8 border-t bg-stone-50 space-y-4 font-bold">
                                        <div className="flex justify-between text-xs text-stone-500"><span>المجموع الفرعي:</span><span>{subtotal.toLocaleString()} {CURRENCY}</span></div>
                                        <div className="flex justify-between text-xs text-green-600"><span>أجور التوصيل:</span><span>{DELIVERY_FEE.toLocaleString()} {CURRENCY}</span></div>
                                        <div className="flex justify-between text-2xl text-orange-600 border-t pt-4"><span>الإجمالي:</span><span>{total.toLocaleString()} {CURRENCY}</span></div>
                                        <button onClick={() => { setIsCartOpen(false); setCurrentView('checkout'); }} className="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl shadow-orange-100 active:scale-95 transition-all">إتمام الطلب</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
